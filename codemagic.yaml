workflows:
  ios-unsigned-build:
    name: SkillLink IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: skillLink-replit-duplicate-main
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @vitejs/plugin-react-swc --save-dev
      - name: Build web assets
        script: |
          npm run build || npx vite build
      - name: Initialize & Sync iOS
        script: |
          npx cap init "SkillLink" "com.skilllink.app" --web-dir=dist
          npx cap add ios || true
          npx cap sync ios
      - name: Build Unsigned App
        script: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
      - name: Package IPA
        script: |
          mkdir -p build/ipa/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app build/ipa/Payload/
          cd build/ipa
          zip -r SkillLink_Unsigned.ipa Payload
    artifacts:
      - build/ipa/*.ipa
